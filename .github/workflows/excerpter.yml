name: package:excerpter

permissions: read-all

on:
  # Run CI on pushes to the main branch, and on PRs against main.
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/excerpter.yml'
      - 'pkgs/excerpter/**'
  pull_request:
    branches: [ main ]
    paths:
      - '.github/workflows/excerpter.yml'
      - 'pkgs/excerpter/**'
  schedule:
    - cron: '0 0 * * 0' # weekly

defaults:
  run:
    working-directory: pkgs/excerpter

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        sdk: ['3.9', dev]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260
        with:
          sdk: ${{ matrix.sdk }}

      - run: dart pub get

      - run: dart analyze --fatal-infos
        if: ${{ matrix.sdk == 'dev' }}

      - run: dart analyze
        if: ${{ matrix.sdk != 'dev' }}

      - run: dart format --output=none --set-exit-if-changed .
        if: ${{ matrix.sdk == 'dev' }}

      - run: dart test
